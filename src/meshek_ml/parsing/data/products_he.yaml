---
# Seed Hebrew product catalog for Plan 07-02 (D-06).
# ~30 staple greengrocer products. Each entry carries Hebrew + English display
# names, a category, a default unit, and a list of raw Hebrew aliases
# (singular + plural + at least one common misspelling). Aliases are
# normalized via meshek_ml.parsing.normalize.normalize_text at load time.
products:
  - id: tomato
    display_he: "עגבנייה"
    display_en: "tomato"
    category: vegetable
    default_unit: kg
    aliases:
      - "עגבנייה"
      - "עגבניה"           # common misspelling (single yod)
      - "עגבניות"
      - "עגבניות אדומות"

  - id: cucumber
    display_he: "מלפפון"
    display_en: "cucumber"
    category: vegetable
    default_unit: kg
    aliases:
